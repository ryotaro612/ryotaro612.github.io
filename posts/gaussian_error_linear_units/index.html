  <h1>GAUSSIAN ERROR LINEAR UNITS (GELUs) 2016</h1>
  <ul class="tags">
    
    <li class="tag">
      <a href="http://localhost:1313/tags/%E6%B4%BB%E6%80%A7%E5%8C%96%E9%96%A2%E6%95%B0/">
	#жҙ»жҖ§еҢ–й–ўж•°
      </a>
    </li>
    
  </ul>  
  <span class="date">October 21, 2023</span>    
  <div>
    <p><a href="https://arxiv.org/abs/1606.08415">GAUSSIAN ERROR LINEAR UNITS (GELUs)</a>гҒҜгҖҒжЁҷжә–жӯЈиҰҸеҲҶеёғгҒ®зҙҜз©ҚеҲҶеёғй–ўж•°гӮ’\(\Phi(x)\)гҒЁгҒҠгҒҸгҒЁгҖҒ\(\text{GELU}(x)=x\Phi(x)\)гҒ§е®ҡзҫ©гҒ•гӮҢгӮӢжҙ»жҖ§еҢ–й–ўж•°гҒ§гҒӮгӮӢгҖӮ
GELUsгҒҜгҖҒDropout, <a href="https://openreview.net/pdf?id=rJqBEPcxe">Zoneout</a>, \(\text{ReLU}(x)=\max(0, x)\)гҒ®жҖ§иіӘгӮ’е…јгҒӯеӮҷгҒҲгӮӢгҖӮ
ZoneoutгҒҜгҖҒRNNгӮҖгҒ‘гҒ®жӯЈеүҮеҢ–гҒ§гҒӮгӮҠгҖҒгғҰгғӢгғғгғҲгҒҢдёҖгҒӨеүҚгҒ®зҠ¶ж…ӢгӮ’зўәзҺҮзҡ„гҒ«з¶ӯжҢҒгҒҷгӮӢгҒ—гҒҸгҒҝгҒ§гҒӮгӮӢгҖӮ
ReLUгҒҜгҖҒйқһз·ҡеҪўжҖ§гҒ«гӮҲгӮҠгҖҒгғӢгғҘгғјгғ©гғ«гғҚгғғгғҲгғҜгғјгӮҜгӮ’йқһз·ҡеҪўй–ўж•°гҒ«иҝ‘дјјгҒ§гҒҚгӮӢгҖӮ
ZoneoutгӮ„DropoutгҒҜжӯЈеүҮеҢ–гҒ®еҪ№еүІгӮ’гҒҜгҒҹгҒҷгҖӮ
ReLUsгҒ®еҮәеҠӣгҒҢе…ҘеҠӣгҒ«дҫқеӯҳгҒҷгӮӢдёҖж–№гҒ§гҖҒDropoutгҒ®еҮәеҠӣгҒҜе…ҘеҠӣгҒ«дҫқеӯҳгҒ—гҒӘгҒ„гҖӮ
GELUsгҒҜгҖҒзўәзҺҮ\(\Phi(x)\)гҒ§1гӮ’гҒЁгӮӢгғҷгғ«гғҢгғјгӮӨеҲҶеёғгҒ«гҒ—гҒҹгҒҢгҒҶ0-1гғһгӮ№гӮҜгӮ’дәәе·ҘгғӢгғҘгғјгғӯгғігҒёгҒ®е…ҘеҠӣгҒ«йҒ©з”ЁгҒҷгӮӢгҒ“гҒЁгҒ§гҖҒйқһз·ҡеҪўй–ўж•°гҒёгҒ®иҝ‘дјјгҒЁжӯЈеүҮеҢ–гҒ®дёЎж–№гӮ’е®ҹзҸҫгҒҷгӮӢгҖӮ</p>
<p>GELUsгҒ«гҒҜгҖҒгғӢгғҘгғјгғ©гғ«гғҚгғғгғҲгғҜгғјгӮҜгҒ®еҮәеҠӣгӮ’жұәе®ҡзҡ„гҒ«гҒҷгӮӢеҠ№жһңгӮӮгҒӮгӮӢгҖӮ
дәәе·ҘгғӢгғҘгғјгғӯгғігҒёгҒ®е…ҘеҠӣгӮ’\(x\)гҒЁгҒҷгӮӢгҒЁгҖҒGeLUsгҒ®йҒ©з”ЁеҫҢгҒ®еҮәеҠӣгҒ®жңҹеҫ…еҖӨгҒҜ\(\Phi(x)\times Ix + (1-\Phi(x))\times 0x=x\Phi(x)\)гҒ«гҒӘгӮӢгҖӮ</p>
<p>$$
\text{GELU}(x)=xP(X\le x)=x\cdot \frac{1}{2}\left[1+\text{erf}(x/\sqrt{2})\right]
$$
гҒҜ
$$
0.5x(1+\tanh\left[\sqrt{2/\pi}(x+0.044715x^3)\right])
$$
гҒ«иҝ‘дјјгҒ§гҒҚгӮӢгҖӮ</p>
