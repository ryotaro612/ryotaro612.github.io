  <h1>RoFormer: Enhanced Transformer with Rotary Position Embedding (2021)</h1>
  <ul class="tags">
    
    <li class="tag">
      <a href="http://localhost:1313/tags/transformer/">

  <span class="date">
    
    March 20, 2026
    
  </span>
  <div>
    <p><a href="https://arxiv.org/pdf/2104.09864">RoFormer: Enhanced Transformer with Rotary Position Embedding</a> (RoPE) は、<a href="https://arxiv.org/pdf/1706.03762">Transformer</a>の$Q$, $K$のトークンベクトルをトークンの位置の定数倍回転することで、自己注意機構に位置のエンコーディングを導入する。
自己注意機構の内積には、$Q$と$K$両トークンの相対的な位置の影響だけが残る。絶対的な位置の影響は違っていても相対距離が等しいとき、内積の結果は変わらない。
相対距離を大きくすると内積の絶対値が小さくなるように比例定数を設定すれば、離れたトークンよりも近いトークンにより注意を向けるエンコーディングになる。</p>
<p>Transformerの自己注意機構にトークンの位置情報を与える場合、$Q$, $K$, $V$の系列を位置情報を組み込む必要がある。
位置$m (n) $にあるトークンのエンベディングを$\boldsymbol{x}_{m (n)}$, トークンと位置のエンコーディングの仕方を$f_q, f_k, f_v$とすると、QKV注意機構を次のように表せる。
</p>
$$
\begin{align*}
\boldsymbol{q}_m&=f_q(\boldsymbol{x}_m, m)\\\\
\boldsymbol{k}_n&=f_k(\boldsymbol{x}_n, n)\\\\
\boldsymbol{v}_n&=f_v(\boldsymbol{x}_n, n)\\\\
a_{m,n}&=\frac{\exp(\frac{\mathbf{q}^\top_mk_n}{\sqrt{d}})}{\sum^N_{j=1}\exp(\frac{\boldsymbol{q}^\top_mk_j}{\sqrt{d}})}\\\\
\boldsymbol{o}_m&=\sum^N_{n=1}a_{m,n}\boldsymbol{v}_n
\end{align*}
$$<p>
自己注意機構への位置情報の与え方は$f_q, f_k, f_v$の定義で決まる。</p>
<p>そのため、元のTransformerでは、正弦関数にもとづく絶対位置ベクトルを入力埋め込みに加算して位置を表現する。
その後の研究では、attentionの重みそのものに相対位置を入れる手法も提案されている。
ただし、これらの手法は位置情報を加算的に扱うものが多く、self-attentionの内積が相対位置だけに依存する構造を直接表しているわけではない。</p>
<p>RoPEは、位置\(m\)のトークンから得たquery \(q_m\)と、位置\(n\)のトークンから得たkey \(k_n\)を、2次元部分空間ごとの回転行列で変換する。
2次元の場合、位置\(m\)のベクトルは角度\(m\theta\)だけ回転される。
偶数次元の一般の場合には、各2次元部分空間に異なる角速度\(\theta_i\)を割り当てたブロック対角行列\(R_{\Theta, m}^d\)をつかい、
</p>
$$
\begin{align*}
q_m &= R_{\Theta, m}^d W_q x_m \\\\
k_n &= R_{\Theta, n}^d W_k x_n
\end{align*}
$$<p>
とする。
このとき、attentionでつかわれる内積は
</p>
$$
q_m^\top k_n = x_m^\top W_q^\top R_{\Theta, n-m}^d W_k x_n
$$<p>
となる。
つまり、各ベクトルには絶対位置\(m, n\)がエンコードされているが、内積は相対位置\(n-m\)だけで記述できる。
回転行列は直交行列なのでベクトルのノルムを保ち、加算型の位置埋め込みよりも表現の大きさを乱しにくい。</p>
<p>論文では、\(\theta_i = 10000^{-2(i-1)/d}\)とおくことで、トークン間の距離が大きくなるほど内積が減衰しやすいことも示している。
著者らは、この性質が遠いトークン同士の関係を弱めるという自然な仮定に対応すると説明している。
また、RoPEは回転によって位置情報を入れるので、線形attentionにも組み込みやすい。
内積の計算量そのものを減らす手法ではないが、既存のattentionの式を大きく変えずに相対位置を導入できる点が利点になる。</p>
<p>実験では、機械翻訳、事前学習、文書分類、文書類似度判定など複数のタスクで評価している。
WMT14 English-Germanでは、ベースラインのTransformerのBLEU 27.3に対してRoFormerは27.5だった。
BERT型モデルの事前学習では、同じ学習ステップ数でベースラインより小さい損失になり、収束が速い傾向が確認されている。
また、中国語の長文類似度判定データセットCAIL2019-SCMでは、入力長512ではWoBERTとほぼ同等だが、1024まで伸ばすとRoFormerの精度が69.79%となり、WoBERT-512の68.10%を上回った。
著者らは、この結果を長文への適性の根拠としている。</p>
<h2 id="雑記">雑記</h2>
<p>RoPEの重要な点は、位置情報をquery, keyに回転として埋め込むことで、attentionの内積に相対位置をそのまま入れられることにある。
絶対位置埋め込みを入力に足すよりも、self-attentionの計算式に近いところで位置の効果を表現している。</p>
<p>一方で、論文自身も、なぜ他の位置エンコーディングより速く収束するのか、なぜ長文でとくによいのかを十分には説明できていないと述べている。
実用上は有効でも、理論的な理解はまだ途上にあるようにみえる。</p>
