  <h1>動画配信プラットフォームの例</h1>
  <ul class="tags">
    
    <li class="tag">
      <a href="http://localhost:1313/tags/system-design-interview/">
	#System Design Interview
      </a>
    </li>
    
  </ul>  
  <span class="date">September 18, 2024</span>    
  <div>
    <p>システム設計面接におけるNetflixやYoutubeのような動画サービスの問題における要点を整理する。</p>
<h2 id="機能要件">機能要件</h2>
<p>参考文献では以下の要件があたえられていた。
どの文献でも視聴とアップロードは求められていた。</p>
<ul>
<li>ストリーミング配信される動画の視聴
<ul>
<li>対応クライアント
<ul>
<li>ブラウザ</li>
<li>モバイル</li>
<li>スマートTV</li>
</ul>
</li>
</ul>
</li>
<li>動画をアップロードできる</li>
<li>ビデオの品質を変更できる</li>
<li>ビデオの検索</li>
<li>評価をつけられる
<ul>
<li>コメントの種類
<ul>
<li>Like</li>
<li>Dislike</li>
<li>Comment</li>
</ul>
</li>
</ul>
</li>
</ul>
<h2 id="back-of-the-envelope-estimation">Back of the envelope estimation</h2>
<p>Back of the envelope estimationでは、以下の数が与えられていた。</p>
<ul>
<li>DAUユーザ数</li>
<li>ユーザが視聴する動画の平均数</li>
<li>アップロードされる動画の数</li>
<li>アップロードれる動画の平均サイズ</li>
</ul>
<h2 id="アーキテクチャ">アーキテクチャ</h2>
<p>どの参考文献でも、</p>
<h2 id="参考">参考</h2>
<ul>
<li><a href="https://www.educative.io/courses/grokking-the-system-design-interview/system-design-youtube">Grokking the Modern System Design Interview</a></li>
<li><a href="https://leetcode.com/explore/learn/card/system-design/690/system-design-case-studies/4388/">LeetCode: Netflix System Design</a></li>
<li><a href="https://bytebytego.com/courses/system-design-interview/design-youtube">System Design Interview: An Insider&rsquo;s Guide</a></li>
</ul>
<h2 id="機能要件-1">機能要件</h2>
<ul>
<li>動画のストリーミング</li>
<li>動画のアップロード</li>
<li>タイトルでの動画検索</li>
<li>動画の評価
<ul>
<li>動画にLike Dislikeをつける</li>
<li>コンメントを残す</li>
</ul>
</li>
<li>サムネイルの表示</li>
</ul>
<h2 id="非機能要件">非機能要件</h2>
<ul>
<li>高可用性</li>
<li>性能・拡張性</li>
<li>完全性</li>
</ul>
<h2 id="質問">質問</h2>
<ul>
<li>DAU,</li>
<li>一人が使う時間の平均</li>
<li>対応端末</li>
</ul>
<p>アップロードは安定させてほうがいい。</p>
<h2 id="アーキテクチャ-1">アーキテクチャ</h2>
<p><a href="/video-streaming/arch.drawio">Draw IO</a>のファイル。</p>
<p>BigTableの使い道
Grokking interviewに評価ポイントがあった。</p>
<h2 id="疑問">疑問</h2>
<p>CDN認証できるか</p>
<ul>
<li>アプリ対応いるか</li>
<li>Responsiveでいいか</li>
<li>分散ストレージにCephがある。</li>
<li>オンプレで実装する場合に使えるOSSを知っておく。</li>
<li>RDBMSで処理できるリクエスト量を知る</li>
</ul>
<h2 id="システム設計の例題">システム設計の例題</h2>
<h2 id="想定するリクエスト量">想定するリクエスト量</h2>
<p>毎分500時間の動画がアップロードされる。
5
マーメイド</p>
