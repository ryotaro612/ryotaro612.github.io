  <h1>AtCoder Begineer Contest 051 D - Candidates of No Shortest Paths</h1>
  <ul class="tags">
    
  </ul>  
  <span class="date">June 14, 2021</span>    
  <div>
    <p>ワーシャルフロイト法で全ての2頂点間の最短距離を求めた後、隣接する2頂点の辺のうち、2頂点の最短距離が辺の重みと異なる辺を数えれば通る。</p>
<div class="highlight"><pre tabindex="0" style="background-color:#fff;-moz-tab-size:4;-o-tab-size:4;tab-size:4;"><code class="language-c++" data-lang="c++"><span style="display:flex;"><span><span style="color:#999;font-weight:bold;font-style:italic">#include</span> <span style="color:#999;font-weight:bold;font-style:italic">&lt;bits/stdc++.h&gt;</span><span style="color:#999;font-weight:bold;font-style:italic">
</span></span></span><span style="display:flex;"><span><span style="color:#999;font-weight:bold;font-style:italic"></span><span style="color:#000;font-weight:bold">using</span> <span style="color:#000;font-weight:bold">namespace</span> std;
</span></span><span style="display:flex;"><span><span style="color:#000;font-weight:bold">typedef</span> <span style="color:#458;font-weight:bold">long</span> <span style="color:#458;font-weight:bold">long</span> ll;
</span></span><span style="display:flex;"><span>
</span></span><span style="display:flex;"><span><span style="color:#000;font-weight:bold">const</span> ll INF <span style="color:#000;font-weight:bold">=</span> <span style="color:#099">100000000000ll</span>;
</span></span><span style="display:flex;"><span>
</span></span><span style="display:flex;"><span><span style="color:#458;font-weight:bold">int</span> <span style="color:#900;font-weight:bold">main</span>() {
</span></span><span style="display:flex;"><span>    <span style="color:#458;font-weight:bold">int</span> n, m;
</span></span><span style="display:flex;"><span>    cin <span style="color:#000;font-weight:bold">&gt;&gt;</span> n <span style="color:#000;font-weight:bold">&gt;&gt;</span> m;
</span></span><span style="display:flex;"><span>    vector<span style="color:#000;font-weight:bold">&lt;</span>ll<span style="color:#000;font-weight:bold">&gt;</span> a(m), b(m), c(m);
</span></span><span style="display:flex;"><span>    <span style="color:#000;font-weight:bold">for</span>(<span style="color:#458;font-weight:bold">int</span> i <span style="color:#000;font-weight:bold">=</span> <span style="color:#099">0</span>; i <span style="color:#000;font-weight:bold">&lt;</span> m; i<span style="color:#000;font-weight:bold">++</span>) {
</span></span><span style="display:flex;"><span>        cin <span style="color:#000;font-weight:bold">&gt;&gt;</span> a[i] <span style="color:#000;font-weight:bold">&gt;&gt;</span> b[i] <span style="color:#000;font-weight:bold">&gt;&gt;</span> c[i];
</span></span><span style="display:flex;"><span>        a[i]<span style="color:#000;font-weight:bold">--</span>;
</span></span><span style="display:flex;"><span>        b[i]<span style="color:#000;font-weight:bold">--</span>;
</span></span><span style="display:flex;"><span>    }
</span></span><span style="display:flex;"><span>    vector<span style="color:#000;font-weight:bold">&lt;</span>vector<span style="color:#000;font-weight:bold">&lt;</span>ll<span style="color:#000;font-weight:bold">&gt;&gt;</span> d(n, vector<span style="color:#000;font-weight:bold">&lt;</span>ll<span style="color:#000;font-weight:bold">&gt;</span>(n, INF));
</span></span><span style="display:flex;"><span>    <span style="color:#000;font-weight:bold">for</span>(<span style="color:#458;font-weight:bold">int</span> i <span style="color:#000;font-weight:bold">=</span> <span style="color:#099">0</span>; i <span style="color:#000;font-weight:bold">&lt;</span> m; i<span style="color:#000;font-weight:bold">++</span>) {
</span></span><span style="display:flex;"><span>        d[a[i]][b[i]] <span style="color:#000;font-weight:bold">=</span> d[b[i]][a[i]] <span style="color:#000;font-weight:bold">=</span> c[i];
</span></span><span style="display:flex;"><span>    }
</span></span><span style="display:flex;"><span>
</span></span><span style="display:flex;"><span>    <span style="color:#000;font-weight:bold">for</span>(<span style="color:#458;font-weight:bold">int</span> k <span style="color:#000;font-weight:bold">=</span> <span style="color:#099">0</span>; k <span style="color:#000;font-weight:bold">&lt;</span> n; k<span style="color:#000;font-weight:bold">++</span>)
</span></span><span style="display:flex;"><span>        <span style="color:#000;font-weight:bold">for</span>(<span style="color:#458;font-weight:bold">int</span> i <span style="color:#000;font-weight:bold">=</span> <span style="color:#099">0</span>; i <span style="color:#000;font-weight:bold">&lt;</span> n; i<span style="color:#000;font-weight:bold">++</span>)
</span></span><span style="display:flex;"><span>            <span style="color:#000;font-weight:bold">for</span>(<span style="color:#458;font-weight:bold">int</span> j <span style="color:#000;font-weight:bold">=</span> <span style="color:#099">0</span>; j <span style="color:#000;font-weight:bold">&lt;</span> n; j<span style="color:#000;font-weight:bold">++</span>)
</span></span><span style="display:flex;"><span>                d[i][j] <span style="color:#000;font-weight:bold">=</span> min(d[i][j], d[i][k] <span style="color:#000;font-weight:bold">+</span> d[k][j]);
</span></span><span style="display:flex;"><span>
</span></span><span style="display:flex;"><span>	<span style="color:#458;font-weight:bold">int</span> ans <span style="color:#000;font-weight:bold">=</span> <span style="color:#099">0</span>;
</span></span><span style="display:flex;"><span>	<span style="color:#000;font-weight:bold">for</span>(<span style="color:#458;font-weight:bold">int</span> i<span style="color:#000;font-weight:bold">=</span><span style="color:#099">0</span>;i<span style="color:#000;font-weight:bold">&lt;</span>m;i<span style="color:#000;font-weight:bold">++</span>) {
</span></span><span style="display:flex;"><span>		<span style="color:#000;font-weight:bold">if</span>(d[a[i]][b[i]] <span style="color:#000;font-weight:bold">!=</span> c[i])
</span></span><span style="display:flex;"><span>			ans<span style="color:#000;font-weight:bold">++</span>;
</span></span><span style="display:flex;"><span>	}
</span></span><span style="display:flex;"><span>	cout <span style="color:#000;font-weight:bold">&lt;&lt;</span> ans <span style="color:#000;font-weight:bold">&lt;&lt;</span> endl;
</span></span><span style="display:flex;"><span>    <span style="color:#000;font-weight:bold">return</span> <span style="color:#099">0</span>;
</span></span><span style="display:flex;"><span>}
</span></span></code></pre></div>
