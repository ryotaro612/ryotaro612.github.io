<main>
  <h1>FLASHATTENTION: Fast and Memory-Efficient Exact Attention with IO-Awareness (2022)</h1>
  <ul class="tags">
    
    <li class="tag">
      <a href="http://localhost:1313/tags/%E6%B3%A8%E6%84%8F%E6%A9%9F%E6%A7%8B/">
        #注意機構
      </a>
    </li>
    
  </ul>
  <span class="date">
    
    December 29, 2025
    
  </span>
  <div>
    <p>Transformerの自己注意機構の時間、空間計算量は、系列長が\(N\)であれば\(O(N^2)\)になる。
<a href="https://arxiv.org/pdf/2001.04451">Reformer: The Efficient Transformer</a>などのFLOP数を減らす手法はあるが、実際の処理時間を十分に短縮できず、普及していない。
<a href="https://arxiv.org/pdf/2205.14135">FLASHATTENTION</a>は、FLOP数ではなく、GPUのHBM (high bandwidth memory) と SRAM間の転送量を減らし、処理時間を短縮する。
HBMの記憶領域はSRAMよりも数十倍大きいが、SRAMよりも数十倍遅い。
注意(\(O\))を計算するとき、FLASHATTENTIONは、\(Q\), \(K\), \(V\), \(O\)の各行列の一部の行ベクトルからなるブロックだけをSRAMに読み込む。
SRAMで更新し、更新した注意をHBMに書き込む。
ブロックの操作を繰り返すと、最終的に自己注意機構と等しい注意を計算できる。</p>
<p>FLASHATTENTIONは、逆伝搬時のHBMとSRAM間の転送量も減らす。
通常、\(Q\), \(K\), \(V\)の勾配を計算するためにSoftmax関数に与える行列\(S\)とその結果\(P\)を記録する。
\(Q\), \(K\), \(V\)が\(\mathbb{R}^{N\times d}\)であれば、\(S\), \(P\)のサイズは\(O(N^2)\)になる。
FLASHATTENTIONは、順伝搬時に計算した中間結果と\(O\)から\(S\), \(P\)を計算し直すことで、\(S\)と\(P\)の記録を省き、空間計算量を減らす。</p>
<!-- 
以下の順番に論文の要旨を説明する文章を続けて。論文はpaper.pdfにあります。

- 標準のAttentionの計算方法
- Scaled Softmax関数を使う必要がある。
- Softmaxの統計量と2つのベクトルから2つを連結したベクトルのSfotmaxを計算できる
- Algorithm1の説明

<p>標準的なアテンションの計算では、入力行列を \(Q, K, V \in \mathbb{R}^{N \times d}\) とし、出力 \(O \in \mathbb{R}^{N \times d}\) を求める。この過程において、アテンションスコア \(S = QK^\top \in \mathbb{R}^{N \times N}\) とソフトマックス後の行列 \(P = \text{softmax}(S) \in \mathbb{R}^{N \times N}\) が計算され、これらの中間行列がHBMに書き出される。しかし、この手法は系列長 \(N\) が大きくなるにつれてメモリ消費量とHBMへのアクセス回数が二次関数的（\(O(N^2)\)）に増大し、実行時間のボトルネックとなる。</p>
<p>また、アテンションの計算においては、数値的な安定性を保ち勾配の消失を防ぐために Scaled Softmax 関数を用いる必要がある。具体的には、行列積 \(QK^\top\) に対してスケーリング因子 \(\tau\)（通常は \(1/\sqrt{d}\)）を乗算する。さらに、指数関数の計算におけるオーバーフローを避けるため、各行の要素から最大値を差し引く「セーフ・ソフトマックス」の手法が取られる。</p>
<p>ソフトマックス関数は、特定の統計量を用いることで、2つのベクトルからそれらを連結したベクトルのソフトマックスを増分的に計算できるという性質を持つ。ベクトル \(x\) に対して最大値 \(m(x) = \max_i x_i\) と指数和 \(\ell(x) = \sum_i e^{x_i - m(x)}\) を定義すると、2つのベクトル \(x^{(1)}, x^{(2)}\) を連結した \(x = [x^{(1)}, x^{(2)}]\) の統計量は、それぞれのブロックの統計量から次のように更新できる。</p>
<p>$$m(x) = \max(m(x^{(1)}), m(x^{(2)})), \quad \ell(x) = e^{m(x^{(1)}) - m(x)} \ell(x^{(1)}) + e^{m(x^{(2)}) - m(x)} \ell(x^{(2)})$$</p>
<p>この統計量 \((m, \ell)\) を保持して適切にスケーリングを行うことで、行列全体を一度にHBMに展開することなく、ブロックごとにソフトマックスを計算することが可能になるのである。</p>
<p>FLASHATTENTION の Algorithm 1 は、この性質を利用して、タイル化（Tiling）によってHBMとの通信を削減する手法である。まず、行列 \(Q, K, V\) をSRAMに収まるサイズのブロックに分割する。アルゴリズムは2重のループで構成されており、外側のループで \(K, V\) のブロックを読み込み、内側のループで \(Q\) のブロックおよび現在の出力 \(O\) と統計量 \((m, \ell)\) をSRAMにロードする。SRAM上においてブロック単位のアテンションスコアを計算した後、新しい統計量 \(m_{\text{new}}, \ell_{\text{new}}\) を用いて、既存の出力値を再スケーリングし、現在のブロックの寄与を加算してHBMに書き戻す。この一連の操作により、巨大な中間行列を介さずに、最終的に正確なアテンション結果 \(O = \text{softmax}(\tau QK^\top)V\) を得ることができる。</p>
